name: Build

# Runs on every push to main.
# Re-generates the CSS bundle and injects shared partials into HTML pages,
# then commits the built files back (with [skip ci] to prevent re-triggering).
# This keeps main.bundled.css and all partial-managed footers always in sync.

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'assets/css/main.bundled.css'  # don't re-run when bot commits the bundle

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to push the built files back

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build CSS bundle
        run: npm run build:css

      - name: Build local landing pages
        run: npm run build:local

      - name: Inject partials
        run: npm run build:partials

      - name: Build sitemap
        run: npm run build:sitemap

      - name: Commit built files (if changed)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/css/main.bundled.css
          git add services/ pages/ index.html areas/
          git add sitemap.xml f2a5c7686a8f412b0e9e78465d440d6e.txt
          git diff --cached --quiet || \
            git commit -m "build: regenerate bundle + local pages + sitemap [skip ci]"
          git push

      - name: Ping IndexNow (non-fatal)
        run: npm run ping
        continue-on-error: true
