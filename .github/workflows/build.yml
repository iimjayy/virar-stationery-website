name: Build

# Runs on every push to main.
# Re-generates the CSS bundle and injects shared partials into HTML pages,
# then commits the built files back (with [skip ci] to prevent re-triggering).
# This keeps main.bundled.css and all partial-managed footers always in sync.

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'assets/css/main.bundled.css'  # don't re-run when bot commits the bundle

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to push the built files back

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build CSS bundle
        run: npm run build:css

      - name: Inject partials
        run: npm run build:partials

      - name: Commit built files (if changed)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/css/main.bundled.css
          git add services/ pages/ index.html
          git diff --cached --quiet || \
            git commit -m "build: regenerate bundle + inject partials [skip ci]"
          git push
